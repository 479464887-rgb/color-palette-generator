<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Color Palette Generator - 色彩理论调色板生成器"><meta property="og:title" content="Color Palette Generator"><title>Color Palette Generator</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:900px;margin:0 auto;padding:24px}.picker-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:20px}.picker-row input[type=color]{width:50px;height:40px;border:1px solid #30363d;border-radius:8px;cursor:pointer;background:transparent;padding:2px}.picker-row select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:8px 12px;border-radius:6px;font-size:13px}.picker-row input[type=text]{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:8px 12px;border-radius:6px;font-size:13px;width:100px}.palettes{display:flex;flex-direction:column;gap:16px}.palette-card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.palette-title{background:#21262d;padding:8px 16px;font-size:13px;font-weight:600;color:#8b949e}.color-strip{display:flex;height:80px}.color-block{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:8px;cursor:pointer;transition:transform .15s;position:relative;min-width:50px}.color-block:hover{transform:scaleY(1.05);z-index:1}.color-block .hex{font-family:monospace;font-size:11px;padding:2px 6px;background:rgba(0,0,0,.5);color:#fff;border-radius:3px;opacity:0;transition:opacity .2s}.color-block:hover .hex{opacity:1}.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s}.copy-toast.show{opacity:1}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}.btn:hover{background:#30363d}</style></head><body><header><h1>🎨 Color Palette Generator</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="picker-row"><input type="color" id="baseColor" value="#58a6ff" onchange="generate()"><input type="text" id="colorHex" value="#58a6ff" onchange="updateFromHex()" maxlength="7"><select id="harmony" onchange="generate()"><option value="complementary">互补色 / Complementary</option><option value="analogous">类似色 / Analogous</option><option value="triadic">三角色 / Triadic</option><option value="tetradic">四角色 / Tetradic</option><option value="monochromatic">单色 / Monochromatic</option><option value="split-complementary">分裂互补 / Split Complementary</option></select><button class="btn" onclick="randomColor()">🎲 随机</button></div><div id="palettes" class="palettes"></div></div><div class="copy-toast" id="toast">已复制！Copied!</div><script>let lang='zh';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}
function hexToHSL(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;let max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min)h=s=0;else{let d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}
function hslToHex(h,s,l){s/=100;l/=100;let a=s*Math.min(l,1-l);let f=n=>(n=(n+h/30)%12,Math.round((l-a*Math.max(Math.min(n-3,9-n,1),-1))*255).toString(16).padStart(2,'0'));return'#'+f(0)+f(8)+f(4)}
function generateColors(hex,type){const{h,s,l}=hexToHSL(hex);const colors=[hex];let offsets=[];switch(type){case'complementary':offsets=[180];break;case'analogous':offsets=[30,60,-30,-60];break;case'triadic':offsets=[120,240];break;case'tetradic':offsets=[90,180,270];break;case'split-complementary':offsets=[150,210];break;case'monochromatic':offsets=[0,0,0,0];break}if(type==='monochromatic'){for(let i=1;i<=4;i++){let nl=Math.min(90,Math.max(10,l+((i-2)*15)));colors.push(hslToHex(h,s,nl))}}else{offsets.forEach(off=>colors.push(hslToHex((h+off)%360,s,l)))}return colors}
function generate(){const hex=document.getElementById('baseColor').value;document.getElementById('colorHex').value=hex;const type=document.getElementById('harmony').value;const colors=generateColors(hex,type);const names={complementary:'互补色 Complementary',analogous:'类似色 Analogous',triadic:'三角色 Triadic',tetradic:'四角色 Tetradic',monochromatic:'单色 Monochromatic','split-complementary':'分裂互补 Split Complementary'};const html=colors.map((c,i)=>{const hsl=hexToHSL(c);return'<div class="color-block" style="background:'+c+';color:'+(hsl.l>50?'#000':'#fff')+'" onclick="copyColor(\''+c+'\')"><span class="hex">'+c+'</span></div>'}).join('');document.getElementById('palettes').innerHTML='<div class="palette-card"><div class="palette-title">'+names[type]+'</div><div class="color-strip">'+html+'</div></div><div class="palette-card"><div class="palette-title">📋 颜色代码</div><div style="padding:12px;font-family:monospace;font-size:13px;display:flex;gap:12px;flex-wrap:wrap">'+colors.map(c=>'<span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:16px;height:16px;background:'+c+';border-radius:3px;border:1px solid #30363d"></span>'+c+'</span>').join(' ')+'</div></div>'}function updateFromHex(){document.getElementById('baseColor').value=document.getElementById('colorHex').value;generate()}function randomColor(){const c='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');document.getElementById('baseColor').value=c;document.getElementById('colorHex').value=c;generate()}function copyColor(c){navigator.clipboard.writeText(c);const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}generate()</script></body></html>
